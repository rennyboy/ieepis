# Production-optimized Docker Compose Stack
version: "3.9"

services:
  # Nginx Reverse Proxy & Static File Server
  nginx:
    image: nginx:stable-alpine
    container_name: ieepis-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ieepis-network
    depends_on:
      app:
        condition: service_healthy

  # PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ieepis-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-ieepis_db}
      DB_USERNAME: ${DB_USERNAME:-ieepis_user}
      DB_PASSWORD: ${DB_PASSWORD:-ieepis_password}
      CACHE_DRIVER: redis
      REDIS_HOST: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - ieepis-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cgi-fcgi", "-bind", "-connect", "127.0.0.1:9000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Queue Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ieepis-worker
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV: production
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-ieepis_db}
      DB_USERNAME: ${DB_USERNAME:-ieepis_user}
      DB_PASSWORD: ${DB_PASSWORD:-ieepis_password}
      REDIS_HOST: redis
    networks:
      - ieepis-network
    depends_on:
      - db
      - redis

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ieepis-scheduler
    restart: unless-stopped
    command: sh -c "while [ true ]; do php artisan schedule:run --no-interaction & sleep 60; done"
    environment:
      APP_ENV: production
      DB_CONNECTION: pgsql
      DB_HOST: db
      REDIS_HOST: redis
    networks:
      - ieepis-network
    depends_on:
      - db
      - redis

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: ieepis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ieepis_db}
      POSTGRES_USER: ${DB_USERNAME:-ieepis_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ieepis_password}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - ieepis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ieepis_user} -d ${DB_DATABASE:-ieepis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ieepis-redis
    restart: unless-stopped
    networks:
      - ieepis-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ieepis-network:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
