server {
    listen 80 default_server;
    server_name _;
    root /var/www/public;
    index index.php index.html;

    charset utf-8;

    # Dev: small bodies are fine, but allow uploads up to PHP's post_max_size
    client_max_body_size 64m;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml+rss application/rss+xml;

    # Static health endpoint (no PHP) — useful while the app boots
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;

        # Forward Cloudflare/cloudflared proxy headers so Laravel TrustProxies
        # sees the real scheme/host (HTTPS detection, signed URLs, redirects).
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for   if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host  if_not_empty;
        fastcgi_param HTTPS                  $https                   if_not_empty;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
    }
}
