version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ieepis-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
    networks:
      - ieepis-network
    depends_on:
      - db

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: ieepis-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ieepis-network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: ieepis-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ieepis_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: ieepis_user
      MYSQL_PASSWORD: ieepis_password
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - ieepis-network

  # Redis (for cache/sessions)
  redis:
    image: redis:alpine
    container_name: ieepis-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - ieepis-network

networks:
  ieepis-network:
    driver: bridge

volumes:
  db-data:
    driver: local
