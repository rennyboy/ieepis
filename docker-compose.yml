# Development Docker Compose stack for IEEPIS
# Use: docker compose up -d
# This file uses bind mounts for local development

x-app-env: &app-env
  APP_NAME: ${APP_NAME:-IEEPIS}
  APP_ENV: local
  APP_DEBUG: "true"
  APP_KEY: ${APP_KEY}
  APP_URL: ${APP_URL:-http://localhost:8080}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DB_CONNECTION: pgsql
  DB_HOST: db
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-ieepis_db}
  DB_USERNAME: ${DB_USERNAME:-ieepis_user}
  DB_PASSWORD: ${DB_PASSWORD:-ieepis_password}
  CACHE_STORE: redis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  SESSION_DRIVER: redis
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  QUEUE_CONNECTION: redis
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  MAIL_MAILER: ${MAIL_MAILER:-log}
  BROADCAST_DRIVER: ${BROADCAST_DRIVER:-log}

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
    target: app
    args:
      INSTALL_DEV: "true"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: ieepis/web:dev
    container_name: ieepis-nginx-dev
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ieepis-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/up", "-o", "/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  app:
    <<: *app-build
    image: ieepis/app:dev
    container_name: ieepis-app-dev
    restart: unless-stopped
    working_dir: /var/www
    init: true
    environment:
      <<: *app-env
    volumes:
      - .:/var/www:cached
      - vendor-data:/var/www/vendor
    networks:
      - ieepis-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cgi-fcgi", "-bind", "-connect", "127.0.0.1:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  worker:
    <<: *app-build
    image: ieepis/app:dev
    container_name: ieepis-worker-dev
    restart: unless-stopped
    working_dir: /var/www
    init: true
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --max-jobs=1000 --backoff=10
    environment:
      <<: *app-env
      CONTAINER_ROLE: worker
    volumes:
      - .:/var/www:cached
      - vendor-data:/var/www/vendor
    networks:
      - ieepis-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  scheduler:
    <<: *app-build
    image: ieepis/app:dev
    container_name: ieepis-scheduler-dev
    restart: unless-stopped
    working_dir: /var/www
    init: true
    command: sh -c "while true; do php artisan schedule:run --no-interaction --verbose --no-ansi; sleep 60; done"
    environment:
      <<: *app-env
      CONTAINER_ROLE: scheduler
    volumes:
      - .:/var/www:cached
      - vendor-data:/var/www/vendor
    networks:
      - ieepis-network
    depends_on:
      app:
        condition: service_healthy
    logging: *default-logging

  db:
    image: postgres:16-alpine
    container_name: ieepis-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ieepis_db}
      POSTGRES_USER: ${DB_USERNAME:-ieepis_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ieepis_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - db-data-dev:/var/lib/postgresql/data
    networks:
      - ieepis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ieepis_user} -d ${DB_DATABASE:-ieepis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: ieepis-redis-dev
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    networks:
      - ieepis-network
    volumes:
      - redis-data-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # Cloudflare Tunnel — opt-in via: docker compose --profile tunnel up -d
  # Requires CLOUDFLARED_TUNNEL_TOKEN from a Named Tunnel in the Zero Trust dashboard.
  # Configure the tunnel's public hostname to route to http://nginx:80.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ieepis-cloudflared-dev
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:-}
    networks:
      - ieepis-network
    depends_on:
      nginx:
        condition: service_healthy
    profiles: ["tunnel"]
    logging: *default-logging

networks:
  ieepis-network:
    driver: bridge

volumes:
  db-data-dev:
    driver: local
  redis-data-dev:
    driver: local
  vendor-data:
    driver: local
