# Development Docker Compose stack for IEEPIS
# Usage: docker compose up -d
#
# Container runtime env: loaded from .env.docker (committed). Hostnames inside
# the network use Docker service names (db, redis).
# Host runtime env: lives in .env (gitignored). Host artisan reaches the Docker
# Postgres via the published port 5432:5432 below.
#
# bootstrap/cache and storage/framework live on named volumes so container
# writes never poison the host bind mount. Live editing of source still works
# because the rest of the project is bind-mounted at /var/www.

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
    target: app
    args:
      INSTALL_DEV: "true"
  image: ieepis/app:dev
  working_dir: /var/www
  init: true
  restart: unless-stopped
  networks:
    - ieepis-network

x-app-volumes: &app-volumes
  - .:/var/www:cached
  - vendor-data:/var/www/vendor
  - app-cache:/var/www/bootstrap/cache
  - app-framework:/var/www/storage/framework

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: ieepis/web:dev
    container_name: ieepis-nginx-dev
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ieepis-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/up", "-o", "/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging

  app:
    <<: *app-build
    container_name: ieepis-app-dev
    env_file:
      - .env.docker
    environment:
      APP_KEY: ${APP_KEY}
    volumes: *app-volumes
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cgi-fcgi", "-bind", "-connect", "127.0.0.1:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  worker:
    <<: *app-build
    container_name: ieepis-worker-dev
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --max-jobs=1000 --backoff=10
    env_file:
      - .env.docker
    environment:
      APP_KEY: ${APP_KEY}
      CONTAINER_ROLE: worker
    volumes: *app-volumes
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  scheduler:
    <<: *app-build
    container_name: ieepis-scheduler-dev
    command: sh -c "while true; do php artisan schedule:run --no-interaction --verbose --no-ansi; sleep 60; done"
    env_file:
      - .env.docker
    environment:
      APP_KEY: ${APP_KEY}
      CONTAINER_ROLE: scheduler
    volumes: *app-volumes
    depends_on:
      app:
        condition: service_healthy
    logging: *default-logging

  db:
    image: postgres:16-alpine
    container_name: ieepis-db-dev
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - db-data-dev:/var/lib/postgresql/data
    networks:
      - ieepis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: ieepis-redis-dev
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    networks:
      - ieepis-network
    volumes:
      - redis-data-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # Cloudflare Tunnel — opt-in via: docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ieepis-cloudflared-dev
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:-}
    networks:
      - ieepis-network
    depends_on:
      nginx:
        condition: service_healthy
    profiles: ["tunnel"]
    logging: *default-logging

networks:
  ieepis-network:
    driver: bridge

volumes:
  db-data-dev:
    driver: local
  redis-data-dev:
    driver: local
  vendor-data:
    driver: local
  app-cache:
    driver: local
  app-framework:
    driver: local
