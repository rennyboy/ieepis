<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - IEEPIS</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f0fdf4;
            color: #166534;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        img {
            max-width: 150px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #15803d;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #16a34a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #15803d;
        }
    </style>
</head>
<body>
    <img src="/images/ieepis-logo.png" alt="IEEPIS Logo">
    <h1>You are offline</h1>
    <p>Please check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
