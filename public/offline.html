<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IEEPIS - Offline</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: #f0fdf4;
      color: #14532d;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    h1 { font-size: 2rem; margin-bottom: 1rem; }
    p { color: #444; margin-bottom: 1.5rem; }
    button {
      background: #16a34a;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 You're Offline</h1>
    <p>The IEEPIS app is currently offline. Please check your internet connection and try again.</p>
    <p>Your queued QR scans will sync automatically when you're back online.</p>
    <button onclick="location.reload()">Retry Connection</button>
  </div>
</body>
</html>
